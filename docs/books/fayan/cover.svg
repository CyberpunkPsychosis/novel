<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800" role="img" aria-label="法眼">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2027"/>
      <stop offset="0.55" stop-color="#203a43"/>
      <stop offset="1" stop-color="#2c5364"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect x="28" y="28" width="544" height="744" fill="none" stroke="#e8c477" stroke-opacity="0.55" stroke-width="2"/>
  <g opacity="0.9">
    <ellipse cx="300" cy="650" rx="120" ry="60" fill="none" stroke="#e8c477" stroke-width="3"/>
    <circle cx="300" cy="650" r="34" fill="none" stroke="#e8c477" stroke-width="3"/>
    <circle cx="300" cy="650" r="13" fill="#e8c477"/>
  </g>
  <style>
    .t { fill: #fff; font-family: 'Noto Serif SC','Songti SC',serif; font-size: 78px; font-weight: 700; text-anchor: middle; letter-spacing: 2px; }
    .a { fill: #e8c477; font-family: 'Noto Serif SC',serif; font-size: 26px; text-anchor: middle; letter-spacing: 4px; }
    .g { fill: #ffffffcc; font-family: sans-serif; font-size: 22px; text-anchor: middle; letter-spacing: 6px; }
  </style>
  <text x="300" y="250" class="t">法</text><text x="300" y="342" class="t">眼</text>
  <text x="300" y="120" class="g">都市</text>
  <text x="300" y="745" class="a">笔名待定</text>

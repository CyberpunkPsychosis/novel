<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800" role="img" aria-label="回声邮局">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0" stop-color="#1d2c3e"/>
      <stop offset="0.5" stop-color="#121a26"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff7e0"/>
      <stop offset="0.35" stop-color="#d7484b"/>
      <stop offset="1" stop-color="#7a4e16"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3cf"/>
      <stop offset="0.5" stop-color="#d7484b"/>
      <stop offset="1" stop-color="#b07d2c"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect x="22" y="22" width="556" height="756" fill="none" stroke="#d7484b" stroke-opacity="0.45" stroke-width="1.5"/>

  <text x="300" y="92" class="tag">科幻　悬疑　软科幻</text>

